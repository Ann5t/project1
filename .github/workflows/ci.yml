name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────────
  # Build & Test ── compile, test, lint, release build
  # ──────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies (mold linker)
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Cache cargo registry and target directory
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo

      - name: cargo check (entire workspace)
        run: cargo check --workspace

      - name: cargo test --lib (library unit tests)
        run: cargo test --lib

      - name: cargo clippy (deny all warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: cargo build --release
        run: cargo build --release

  # ──────────────────────────────────────────────────
  # Lint ── formatting and clippy in a dedicated job
  # ──────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace

  # ──────────────────────────────────────────────────
  # Docker ── build image, verify health, tag with SHA
  # ──────────────────────────────────────────────────
  docker:
    name: Docker Build & Verify
    runs-on: ubuntu-latest
    needs: [build, lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (GH Actions cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ai-agent:latest
            ai-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container and verify health check
        run: |
          echo "Starting container for health verification..."
          docker run -d --name ai-agent-test -p 3000:3000 ai-agent:${{ github.sha }}

          echo "Polling health endpoint (up to 30 attempts, 2 s apart)..."
          healthy=false
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Health check passed on attempt $i"
              healthy=true
              break
            fi
            printf "  attempt %2d/30 failed, retrying...\n" "$i"
            sleep 2
          done

          if [ "$healthy" = false ]; then
            echo "Health check failed after 30 attempts. Container logs:"
            docker logs ai-agent-test
            docker stop ai-agent-test || true
            docker rm ai-agent-test || true
            exit 1
          fi

          echo "Stopping and removing test container..."
          docker stop ai-agent-test
          docker rm ai-agent-test
          echo "Container health verified successfully."
